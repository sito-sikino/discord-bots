[loggers]
keys=root,discord,agents,core,integrations

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=structuredFormatter,simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_discord]
level=INFO
handlers=consoleHandler,fileHandler
qualname=discord
propagate=0

[logger_agents]
level=INFO
handlers=consoleHandler,fileHandler
qualname=agents
propagate=0

[logger_core]
level=INFO
handlers=consoleHandler,fileHandler
qualname=core
propagate=0

[logger_integrations]
level=INFO
handlers=consoleHandler,fileHandler
qualname=integrations
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=structuredFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=structuredFormatter
args=('logs/discord_bots.log', 'a')

[formatter_structuredFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_simpleFormatter]
format=%(levelname)s - %(message)s